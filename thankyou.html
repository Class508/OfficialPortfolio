<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submission Successful</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #000000, #0a1f44);
            font-family: Arial, sans-serif;
            color: white;
        }

        .container {
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 102, 255, 0.6);
        }

        h1 {
            color: #1e90ff;
            margin-bottom: 10px;
        }

        p {
            color: #cfcfcf;
            margin-bottom: 25px;
        }

        .home-btn {
            background: #1e90ff;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
        }

        .home-btn:hover {
            background: #0066ff;
            box-shadow: 0 0 10px #1e90ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✔ Form Submitted Successfully</h1>
        <p>Thank you for contacting us. We will get back to you soon.</p>
        <a href="index.html" class="home-btn">Go to Home Page</a>
    </div>

</html>
